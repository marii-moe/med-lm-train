max_steps = 1000
seq_len = 2048
max_async_level = 1

[deployment]
type = "single_node"
num_train_gpus = 2
num_infer_gpus = 6

[wandb]
project = "baseline"
name = "baseline"

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[orchestrator]
batch_size = 512
rollouts_per_example = 16
max_concurrent = 96

[orchestrator.model.lora]
name = "baseline"

[orchestrator.sampling]
max_tokens = 1024
temperature = 1.0

[[orchestrator.env]]
id = "medqa"

[[orchestrator.env]]
id = "med_mcqa"

[[orchestrator.env]]
id = "pubmedqa"

[[orchestrator.env]]
id = "medcalc_bench"

[orchestrator.buffer]
env_ratios = [1, 1, 1, 1, 1, 1, 1, 1]
online_difficulty_filtering = true
easy_threshold = 0.8
hard_threshold = 0.2
easy_fraction = 0.0
hard_fraction = 0.0

[orchestrator.ckpt]

[orchestrator.val]
interval = 10
num_examples = 3525
rollouts_per_example = 1

[orchestrator.val.sampling]
seed = 42
temperature = 0.0 #um, what?!? this doesn't seem right

[[orchestrator.val.env]]
id = "medqa"

[[orchestrator.val.env]]
id = "med_mcqa"

[[orchestrator.val.env]]
id = "pubmedqa"

[[orchestrator.val.env]]
id = "medcalc_bench"

[orchestrator.val.buffer]
env_ratios = [0.18, 0.593, 0.071, 0.156]

[orchestrator.val.env.args]
judge_model = "nopeity_nope"

[orchestrator.eval]
interval = 100
num_examples = 500
rollouts_per_example = 1

[orchestrator.eval.sampling]
seed = 42
temperature = 0.0 #um, what?!? this doesn't seem right

[[orchestrator.eval.env]]
id = "medqa"

[[orchestrator.eval.env]]
id = "med_mcqa"

[[orchestrator.eval.env]]
id = "pubmedqa"

[[orchestrator.eval.env]]
id = "medcalc_bench"

[orchestrator.eval.env.args]
judge_model = "nopeity_nope"

[trainer.model.lora]
rank = 64 #based on results from notion. April 1 2026 

[trainer.ckpt.weights]
save_adapter_separately = true #required for https://github.com/PrimeIntellect-ai/prime-rl/issues/1707

[trainer.optim]
lr = 1e-5
max_norm = 0.01 #is this a good idea?

[inference]
enable_lora = true
gpu_memory_utilization = 0.9

[inference.parallel]
tp = 1
dp = 6

[inference.model]
max_model_len = 2048