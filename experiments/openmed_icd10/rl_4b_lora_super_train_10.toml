# 2100 steps per epoch of sameedkhan/medconceptsqa-sample_medarc_2k
# ds len 258338
max_steps = 4200 #  20 percent of a med concept epoch
seq_len = 2048
max_async_level = 3

[model]
name = "Qwen/Qwen3-4B"

[weight_broadcast]
type = "filesystem"

[orchestrator]
token_batch_size = 131072
rollouts_per_example = 8
max_inflight_rollouts = 64

[orchestrator.sampling]
# Allow space for clinical-note reasoning traces before the ICD-10 code answer.
max_tokens = 2048

[[orchestrator.env]]
id = "maziyar/OpenMed_ICD10"
name = "openmed-icd10"

[[orchestrator.env]]
id = "marii/medconcepts_train"
name = "medconcepts_train_icd10cm"
args = { answer_format = "boxed" }

[orchestrator.buffer]
env_ratios = [0.9, 0.1]

[orchestrator.eval]
interval = 100

[[orchestrator.eval.env]]
id = "medarc/medconceptsqa"
name = "medconceptsqa"
rollouts_per_example = 3
args = { answer_format = "boxed" }

[trainer.model]
impl = "auto"
attn = "flash_attention_3"
seq_len = 12288
optimization_dtype = "bfloat16"

[trainer.model.ac]
freq = 2

[trainer.model.lora]
rank = 32
alpha = 32

[trainer.model.compile]

[trainer.optim]
lr = 5e-6

[trainer.scheduler]
type = "linear"
warmup_steps = 38 #10% of max_steps, can be 5% on long training
decay_steps = 0

[ckpt]
interval = 100
keep_last = 2

[inference]
gpu_memory_utilization = 0.92

# dp is automatically computed as num_infer_gpus // tp if omitted
[inference.parallel]
dp = 3

[inference.model]
max_model_len = 2048
dtype = "bfloat16"

